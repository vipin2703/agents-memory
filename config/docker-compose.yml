  # -----------------------------------------------------------
  # AGENT MEMORY stores — SQL (postgres) + Elasticsearch + Neo4j
  # -----------------------------------------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: agent_memory_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=agent-memory
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
    volumes:
      - agent_memory_elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s

  # Credentials: config/.env  (MEMORY_NEO4J_*, GRAPHXR_*)
  neo4j:
    image: neo4j:5.26
    container_name: agent_memory_neo4j
    env_file:
      - .env
    environment:
      - NEO4J_AUTH=${MEMORY_NEO4J_USER}/${MEMORY_NEO4J_PASSWORD}
      - MEMORY_NEO4J_USER=${MEMORY_NEO4J_USER}
      - MEMORY_NEO4J_PASSWORD=${MEMORY_NEO4J_PASSWORD}
      - NEO4J_server_memory_heap_initial__size=256m
      - NEO4J_server_memory_heap_max__size=512m
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - agent_memory_neo4j_data:/data
      - agent_memory_neo4j_plugins:/plugins
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u \"$$MEMORY_NEO4J_USER\" -p \"$$MEMORY_NEO4J_PASSWORD\" 'RETURN 1' || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 40s

  # GraphXR Lite — 3D UI for Neo4j (http://localhost:8080)
  # Login / Neo4j auth: config/.env  GRAPHXR_* + MEMORY_NEO4J_*
  graphxr-mongo:
    image: mongo:7
    container_name: agent_memory_graphxr_mongo
    restart: unless-stopped
    volumes:
      - agent_memory_graphxr_mongo_data:/data/db

  graphxr:
    image: kineviz/graphxr_lite:neo4j
    container_name: agent_memory_graphxr
    platform: linux/amd64
    restart: unless-stopped
    env_file:
      - .env
    ports:
      # GraphXR Lite serves its web UI on container port 8000 (not 9000).
      - "8080:8000"
    volumes:
      - agent_memory_graphxr_data:/data
    environment:
      - ADMIN_EMAIL=${GRAPHXR_ADMIN_EMAIL}
      - ADMIN_PASSWORD=${GRAPHXR_ADMIN_PASSWORD}
      - NEO4J_HOST=neo4j
      - NEO4J_BOLT_PORT=7687
      - NEO4J_USERNAME=${MEMORY_NEO4J_USER}
      - NEO4J_PASSWORD=${MEMORY_NEO4J_PASSWORD}
      - NEO4J_DATABASE=neo4j
      - MONGO_URL=mongodb://graphxr-mongo:27017/graphxr
    depends_on:
      neo4j:
        condition: service_healthy
      graphxr-mongo:
        condition: service_started

  # -----------------------------------------------------------
  # AGENT MEMORY schema migrates — NOT in app code
  #   memory-migrate         → Postgres DB + tables
  #   elasticsearch-migrate  → ES index (BM25 + dense_vector)
  #   neo4j-migrate          → Neo4j constraints (knowledge graph)
  # -----------------------------------------------------------
  memory-migrate:
    image: docker.io/postgres:${POSTGRES_VERSION:-17}
    container_name: agent_memory_migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MEMORY_DB_NAME: agent_memory
      PGHOST: postgres
      PGPORT: "5432"
      SCHEMA_FILE: /schema.sql
    volumes:
      - ../backend/agent_memory/sql/schema.sql:/schema.sql:ro
      - ../backend/agent_memory/sql/init_db.sh:/init_db.sh:ro
    entrypoint: ["/bin/bash", "/init_db.sh"]

  elasticsearch-migrate:
    image: curlimages/curl:8.5.0
    container_name: agent_memory_elasticsearch_migrate
    restart: "no"
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      MEMORY_ELASTICSEARCH_URL: http://elasticsearch:9200
      MEMORY_ELASTICSEARCH_INDEX: agent_memory_messages
      SCHEMA_FILE: /index.json
    volumes:
      - ../backend/agent_memory/elasticsearch/index.json:/index.json:ro
      - ../backend/agent_memory/elasticsearch/init_index.sh:/init_index.sh:ro
    entrypoint: ["/bin/sh", "/init_index.sh"]

  neo4j-migrate:
    image: neo4j:5.26
    container_name: agent_memory_neo4j_migrate
    restart: "no"
    depends_on:
      neo4j:
        condition: service_healthy
    env_file:
      - .env
    environment:
      MEMORY_NEO4J_USER: ${MEMORY_NEO4J_USER}
      MEMORY_NEO4J_PASSWORD: ${MEMORY_NEO4J_PASSWORD}
      NEO4J_HOST: neo4j
      NEO4J_BOLT_PORT: "7687"
      SCHEMA_FILE: /schema.cypher
    volumes:
      - ../backend/agent_memory/knowledge_graph/schema.cypher:/schema.cypher:ro
      - ../backend/agent_memory/knowledge_graph/init_graph.sh:/init_graph.sh:ro
    entrypoint: ["/bin/bash", "/init_graph.sh"]

  # -----------------------------------------------------------
  # CLIENT (backend) -- vLLM server ko HTTP se call karta h
  # -----------------------------------------------------------
  client:
    ports:
      - "5000:5000"
    build:
      context: ../backend
      dockerfile: Dockerfile
    # Live code: host backend files container me mount -- rebuild ke bina fix test
    volumes:
      - ../backend:/app
    container_name: llm_serve
    depends_on:
      vllm-server:
        condition: service_started
      postgres:
        condition: service_healthy
      memory-migrate:
        condition: service_completed_successfully
      elasticsearch-migrate:
        condition: service_completed_successfully
      neo4j-migrate:
        condition: service_completed_successfully
    env_file:
      - ../backend/vllm/.env
      - ../backend/agent_memory/.env

  # =============================================================
  # LANGFUSE STACK (self-hosted, v3) -- LLM observability/tracing
  # Docs: https://langfuse.com/self-hosting/deployment/docker-compose
  # =============================================================

  langfuse-worker:
    image: docker.io/langfuse/langfuse-worker:3
    restart: always
    depends_on: &langfuse-depends-on
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    ports:
      - "127.0.0.1:3030:3030"
    environment: &langfuse-worker-env
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      DATABASE_URL: ${DATABASE_URL}
      SALT: ${SALT}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      TELEMETRY_ENABLED: ${TELEMETRY_ENABLED:-true}
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: ${LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES:-false}

      CLICKHOUSE_MIGRATION_URL: ${CLICKHOUSE_MIGRATION_URL}
      CLICKHOUSE_URL: ${CLICKHOUSE_URL}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_CLUSTER_ENABLED: ${CLICKHOUSE_CLUSTER_ENABLED:-false}

      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: ${LANGFUSE_S3_EVENT_UPLOAD_BUCKET}
      LANGFUSE_S3_EVENT_UPLOAD_REGION: ${LANGFUSE_S3_EVENT_UPLOAD_REGION}
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: ${LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT}
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: ${LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE}
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: ${LANGFUSE_S3_EVENT_UPLOAD_PREFIX:-events/}
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: ${LANGFUSE_S3_MEDIA_UPLOAD_BUCKET}
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: ${LANGFUSE_S3_MEDIA_UPLOAD_REGION}
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: ${LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID}
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY}
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: ${LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT}
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: ${LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE:-true}
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: ${LANGFUSE_S3_MEDIA_UPLOAD_PREFIX:-media/}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_AUTH: ${REDIS_AUTH}
      REDIS_TLS_ENABLED: ${REDIS_TLS_ENABLED:-false}

  langfuse-web:
    image: docker.io/langfuse/langfuse:3
    restart: always
    depends_on: *langfuse-depends-on
    ports:
      - "3000:3000"
    environment:
      <<: *langfuse-worker-env
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      LANGFUSE_INIT_ORG_ID: ${LANGFUSE_INIT_ORG_ID}
      LANGFUSE_INIT_ORG_NAME: ${LANGFUSE_INIT_ORG_NAME}
      LANGFUSE_INIT_PROJECT_ID: ${LANGFUSE_INIT_PROJECT_ID}
      LANGFUSE_INIT_PROJECT_NAME: ${LANGFUSE_INIT_PROJECT_NAME}
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_INIT_PROJECT_PUBLIC_KEY}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_INIT_PROJECT_SECRET_KEY}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL}
      LANGFUSE_INIT_USER_NAME: ${LANGFUSE_INIT_USER_NAME}
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD}

  clickhouse:
    image: docker.io/clickhouse/clickhouse-server
    restart: always
    user: "101:101"
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    volumes:
      - langfuse_clickhouse_data:/var/lib/clickhouse
      - langfuse_clickhouse_logs:/var/log/clickhouse-server
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 1s

  minio:
    image: cgr.dev/chainguard/minio
    restart: always
    entrypoint: sh
    command: -c 'mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9090:9000"
      - "127.0.0.1:9091:9001"
    volumes:
      - langfuse_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 1s
      timeout: 5s
      retries: 5
      start_period: 1s

  redis:
    image: docker.io/redis:7
    restart: always
    command: >
      --requirepass ${REDIS_AUTH}
      --maxmemory-policy noeviction
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - langfuse_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 10s
      retries: 10

  postgres:
    image: docker.io/postgres:${POSTGRES_VERSION:-17}
    restart: always
    healthcheck:
      # test: ["CMD-SHELL", "pg_isready -U postgresuser"]
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 10
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: UTC
      PGTZ: UTC
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - langfuse_postgres_data:/var/lib/postgresql/data

volumes:
  langfuse_postgres_data:
    driver: local
  langfuse_clickhouse_data:
    driver: local
  langfuse_clickhouse_logs:
    driver: local
  langfuse_minio_data:
    driver: local
  langfuse_redis_data:
    driver: local
  agent_memory_elasticsearch_data:
    driver: local
  agent_memory_neo4j_data:
    driver: local
  agent_memory_neo4j_plugins:
    driver: local
  agent_memory_graphxr_data:
    driver: local
  agent_memory_graphxr_mongo_data:
    driver: local