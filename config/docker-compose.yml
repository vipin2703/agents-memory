  # -----------------------------------------------------------
  # PHI-4-mini (GGUF via custom Dockerfile) — ACTIVE.
  # Better tool-calling + extraction than gemma-3-1b.
  # -----------------------------------------------------------
  vllm-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vllm_phi4_server
    runtime: nvidia
    ipc: host
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - "${MODEL_HOST_PATH}:${MODEL_CONTAINER_PATH}"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - VLLM_LOGGING_LEVEL=DEBUG
    command:
      - "${MODEL_CONTAINER_PATH}/${GGUF_FILE_NAME}"
      - "--tokenizer"
      - "${BASE_MODEL_ID}"
      - "--served-model-name"
      - "${SERVED_MODEL_NAME}"
      - "--dtype"
      - "float16"
      - "--max-model-len"
      - "${MAX_MODEL_LEN}"
      - "--gpu-memory-utilization"
      - "${GPU_MEMORY_UTILIZATION}"
      - "--enforce-eager"
      - "--structured-outputs-config.backend"
      - "xgrammar"
      - "--host"
      - "${HOST}"
      - "--port"
      - "${PORT}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]




